<style>
/* ============================================================
   PREMIUM E-BOOK READER — DESIGN SYSTEM
   Vanilla CSS. Custom-property driven. 8 themes.
   ============================================================ */

/* ---- Design tokens (defaults / Light) ---- */
:root {
  /* palette */
  --bg: #faf8f3;
  --bg-2: #f1ede3;
  --fg: #2b2b2b;
  --fg-soft: #4a4640;
  --muted: #7a7368;
  --accent: #7b1113;
  --accent-soft: #a8434530;
  --accent-fg: #ffffff;
  --panel: #ffffff;
  --panel-2: #f6f3ec;
  --panel-border: #e6e0d4;
  --shadow: rgba(40, 30, 10, 0.14);
  --shadow-strong: rgba(40, 30, 10, 0.28);
  --sel: #f3e6c8;
  --ring: #a84345;

  /* highlight palette (shared across themes) */
  --hl-yellow: #ffe27a;
  --hl-blue:   #a8d8ff;
  --hl-green:  #b6efb6;
  --hl-pink:   #ffc1d8;
  --hl-orange: #ffd0a1;
  --hl-purple: #d9c2ff;

  /* typography (user adjustable) */
  --font-family: Georgia, 'Times New Roman', 'Noto Serif', serif;
  --font-scale: 1;
  --line-height: 1.78;
  --para-spacing: 1.15rem;
  --para-indent: 1.4em;
  --word-spacing: 0em;
  --letter-spacing: 0em;
  --font-weight: 400;
  --text-align: justify;
  --reading-width: 38rem;
  --page-margin: 1.25rem;

  /* motion */
  --anim-scale: 1;
  --dur-fast: calc(0.15s * var(--anim-scale));
  --dur: calc(0.28s * var(--anim-scale));
  --dur-slow: calc(0.45s * var(--anim-scale));
  --ease: cubic-bezier(0.4, 0.0, 0.2, 1);

  /* layout */
  --topbar-h: 54px;
  --radius: 14px;
  --radius-sm: 9px;

  /* brightness overlay (0 = none) */
  --brightness: 0;
}

/* ---- Themes ---- */
[data-theme="sepia"] {
  --bg: #f4ecd8; --bg-2: #ece1c6; --fg: #4b3f2f; --fg-soft: #5d4f3a;
  --muted: #8a795d; --accent: #8a5a1a; --accent-soft: #8a5a1a30; --accent-fg: #fff;
  --panel: #fbf4e3; --panel-2: #f2e8cf; --panel-border: #e3d6b8;
  --shadow: rgba(80, 55, 15, 0.16); --shadow-strong: rgba(80,55,15,.3);
  --sel: #e8d6a8; --ring: #b07d2a;
}
[data-theme="dark"] {
  --bg: #1a1c20; --bg-2: #15171a; --fg: #d6d9dd; --fg-soft: #b9bdc2;
  --muted: #8b9197; --accent: #e0934a; --accent-soft: #e0934a26; --accent-fg: #1a1c20;
  --panel: #23262c; --panel-2: #2b2f36; --panel-border: #353a42;
  --shadow: rgba(0,0,0,0.45); --shadow-strong: rgba(0,0,0,0.65);
  --sel: #3a3320; --ring: #e0934a;
}
[data-theme="amoled"] {
  --bg: #000000; --bg-2: #050505; --fg: #d8dadd; --fg-soft: #b4b7bb;
  --muted: #7f8489; --accent: #d98a3d; --accent-soft: #d98a3d22; --accent-fg: #000;
  --panel: #0c0c0e; --panel-2: #131316; --panel-border: #232327;
  --shadow: rgba(0,0,0,0.8); --shadow-strong: rgba(0,0,0,0.95);
  --sel: #2a2410; --ring: #d98a3d;
}
[data-theme="paper"] {
  --bg: #ffffff; --bg-2: #f4f4f4; --fg: #1f1f1f; --fg-soft: #3a3a3a;
  --muted: #777; --accent: #2b2b2b; --accent-soft: #00000014; --accent-fg: #fff;
  --panel: #ffffff; --panel-2: #f6f6f6; --panel-border: #e2e2e2;
  --shadow: rgba(0,0,0,0.12); --shadow-strong: rgba(0,0,0,0.24);
  --sel: #e9e9e9; --ring: #555;
}
[data-theme="night"] {
  --bg: #0f1726; --bg-2: #0b111d; --fg: #c5d2e6; --fg-soft: #aab7cd;
  --muted: #7585a0; --accent: #5b9bd5; --accent-soft: #5b9bd522; --accent-fg: #0b111d;
  --panel: #16203200; --panel: #162032; --panel-2: #1c293f; --panel-border: #273349;
  --shadow: rgba(0,0,0,0.5); --shadow-strong: rgba(0,0,0,0.7);
  --sel: #25324a; --ring: #5b9bd5;
}
[data-theme="warm"] {
  --bg: #fbeee0; --bg-2: #f4e0cc; --fg: #432e1f; --fg-soft: #5a4030;
  --muted: #9b7a5e; --accent: #c2541b; --accent-soft: #c2541b26; --accent-fg: #fff;
  --panel: #fdf3e8; --panel-2: #f6e6d4; --panel-border: #ecd7bf;
  --shadow: rgba(120,70,20,.16); --shadow-strong: rgba(120,70,20,.3);
  --sel: #f3d9b8; --ring: #c2541b;
}
[data-theme="contrast"] {
  --bg: #000000; --bg-2: #000000; --fg: #ffffff; --fg-soft: #ffffff;
  --muted: #d0d000; --accent: #ffd400; --accent-soft: #ffd40030; --accent-fg: #000;
  --panel: #000000; --panel-2: #0a0a0a; --panel-border: #ffd400;
  --shadow: rgba(255,212,0,.25); --shadow-strong: rgba(255,212,0,.4);
  --sel: #333300; --ring: #ffd400;
}

/* ---- Reset & base ---- */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
html.no-smooth { scroll-behavior: auto; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-family);
  line-height: var(--line-height);
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
body.modal-open { overflow: hidden; }
::selection { background: var(--sel); color: var(--fg); }
button, input, select, textarea { font-family: inherit; }
a { color: var(--accent); }

/* Focus visibility (accessibility) */
:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
  border-radius: 4px;
}
body.no-focus-ring :focus-visible { outline: none; }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  * { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}
html.reduce-motion, html.reduce-motion * {
  animation-duration: .001ms !important;
  transition-duration: .001ms !important;
  scroll-behavior: auto !important;
}

/* ---- Brightness / warmth overlay ---- */
#brightness-overlay {
  position: fixed; inset: 0; z-index: 95; pointer-events: none;
  background: #000; opacity: var(--brightness); transition: opacity var(--dur) var(--ease);
}

/* ============================================================
   PROGRESS BAR
   ============================================================ */
#progress-track {
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: var(--panel-border); z-index: 60;
}
#progress-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--ring));
  transition: width var(--dur-fast) linear;
}

/* ============================================================
   TOP BAR
   ============================================================ */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h); z-index: 50;
  display: flex; align-items: center; gap: .25rem;
  padding: 0 .5rem; padding-top: env(safe-area-inset-top, 0);
  background: color-mix(in srgb, var(--panel) 88%, transparent);
  backdrop-filter: saturate(160%) blur(14px);
  -webkit-backdrop-filter: saturate(160%) blur(14px);
  border-bottom: 1px solid var(--panel-border);
  box-shadow: 0 1px 10px var(--shadow);
  transform: translateY(0); transition: transform var(--dur) var(--ease);
}
#topbar.hidden { transform: translateY(-110%); }
#topbar .title {
  font-size: .92rem; font-weight: 600; color: var(--fg);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0; padding: 0 .25rem;
}
#topbar .pct {
  font-size: .78rem; color: var(--muted); white-space: nowrap;
  font-variant-numeric: tabular-nums; padding: 0 .3rem;
}
.iconbtn {
  background: transparent; border: 1px solid transparent;
  color: var(--fg); cursor: pointer;
  width: 40px; height: 40px; border-radius: 10px;
  font-size: 1.15rem; line-height: 1; position: relative; overflow: hidden;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
  flex: none; -webkit-tap-highlight-color: transparent;
}
.iconbtn svg { width: 21px; height: 21px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.iconbtn:hover { background: var(--sel); }
.iconbtn:active { transform: scale(.9); }
.iconbtn.active { color: var(--accent); }
.iconbtn .dot {
  position: absolute; top: 7px; right: 8px; width: 7px; height: 7px;
  border-radius: 50%; background: var(--accent); display: none;
}
.iconbtn.has-items .dot { display: block; }

/* Ripple */
.ripple {
  position: absolute; border-radius: 50%; background: currentColor;
  opacity: .25; transform: scale(0); pointer-events: none;
  animation: ripple var(--dur-slow) var(--ease);
}
@keyframes ripple { to { transform: scale(2.6); opacity: 0; } }

/* ============================================================
   OVERLAY + DRAWERS (panels)
   ============================================================ */
#overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  opacity: 0; pointer-events: none; transition: opacity var(--dur) var(--ease); z-index: 70;
  backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
}
#overlay.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed; top: 0; bottom: 0; left: 0;
  width: 340px; max-width: 86vw; z-index: 80;
  background: var(--panel);
  border-right: 1px solid var(--panel-border);
  transform: translateX(-105%); transition: transform var(--dur) var(--ease);
  display: flex; flex-direction: column;
  box-shadow: 2px 0 28px var(--shadow);
  padding-top: env(safe-area-inset-top, 0);
}
.drawer.right { left: auto; right: 0; border-right: none; border-left: 1px solid var(--panel-border); transform: translateX(105%); box-shadow: -2px 0 28px var(--shadow); }
.drawer.open { transform: translateX(0); }
.drawer-head {
  margin: 0; padding: 1rem 1.1rem; font-size: 1.02rem; font-weight: 600;
  border-bottom: 1px solid var(--panel-border); color: var(--accent);
  display: flex; align-items: center; justify-content: space-between; gap: .5rem;
}
.drawer-head .grow { flex: 1; }
.drawer-body { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.drawer-tabs {
  display: flex; gap: .25rem; padding: .5rem .6rem 0; border-bottom: 1px solid var(--panel-border);
  overflow-x: auto;
}
.drawer-tabs button {
  flex: none; padding: .5rem .7rem; border: none; background: transparent; cursor: pointer;
  color: var(--muted); font-size: .82rem; font-weight: 600; border-bottom: 2px solid transparent;
  white-space: nowrap; transition: color var(--dur-fast);
}
.drawer-tabs button.sel { color: var(--accent); border-bottom-color: var(--accent); }
.tabpane { display: none; padding: .6rem .9rem 2rem; }
.tabpane.sel { display: block; animation: fadeIn var(--dur) var(--ease); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ============================================================
   TABLE OF CONTENTS
   ============================================================ */
#toc { list-style: none; margin: 0; padding: .4rem 0; }
#toc li a {
  display: flex; gap: .6rem; align-items: center;
  padding: .6rem 1.1rem; text-decoration: none; color: var(--fg);
  border-left: 3px solid transparent; transition: background var(--dur-fast) var(--ease);
}
#toc li a:hover { background: var(--sel); }
#toc li a.active { border-left-color: var(--accent); background: var(--sel); }
#toc li a.active .toc-name { color: var(--accent); font-weight: 600; }
.toc-num { color: var(--muted); font-size: .78rem; min-width: 2.4rem; font-variant: small-caps; flex: none; }
.toc-name { font-size: .94rem; flex: 1; }
.toc-pct { color: var(--muted); font-size: .72rem; font-variant-numeric: tabular-nums; flex: none; }
.toc-read { color: var(--accent); }

/* ============================================================
   SETTINGS PANEL (drawer on the right)
   ============================================================ */
.set-group { padding: .35rem 0 1rem; border-bottom: 1px solid var(--panel-border); margin-bottom: .9rem; }
.set-group:last-child { border-bottom: none; }
.set-group > label, .set-label {
  display: block; font-size: .74rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: .55rem; font-weight: 700;
}
.set-val { float: right; color: var(--accent); font-weight: 600; text-transform: none; letter-spacing: 0; }

.seg, .theme-grid, .preset-row { display: flex; gap: .4rem; flex-wrap: wrap; }
.seg button, .chip {
  flex: 1; padding: .55rem .4rem; border-radius: var(--radius-sm); cursor: pointer;
  border: 1px solid var(--panel-border); background: var(--panel-2); color: var(--fg);
  font-size: .85rem; transition: all var(--dur-fast) var(--ease); min-width: 0;
}
.seg button:hover, .chip:hover { border-color: var(--ring); }
.seg button.sel, .chip.sel {
  border-color: var(--accent); color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent) inset;
}

.theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .5rem; }
.theme-sw {
  cursor: pointer; border-radius: 10px; border: 2px solid var(--panel-border);
  padding: 0; height: 52px; position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: stretch; transition: border-color var(--dur-fast);
}
.theme-sw .swatch { flex: 1; display: flex; align-items: center; justify-content: center; font-size: .95rem; font-weight: 700; }
.theme-sw .nm { font-size: .6rem; padding: 2px 0; text-align: center; background: rgba(127,127,127,.15); }
.theme-sw.sel { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

/* sliders */
.slider-row { display: flex; align-items: center; gap: .6rem; }
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
  border-radius: 4px; background: var(--panel-border); outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--panel); box-shadow: 0 1px 4px var(--shadow);
}
input[type=range]::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%; background: var(--accent);
  border: 2px solid var(--panel); box-shadow: 0 1px 4px var(--shadow);
}
.stepper { display: flex; align-items: center; gap: .4rem; }
.stepper button {
  width: 38px; height: 38px; flex: none; border-radius: var(--radius-sm);
  border: 1px solid var(--panel-border); background: var(--panel-2); color: var(--fg);
  cursor: pointer; font-size: 1rem; transition: all var(--dur-fast);
}
.stepper button:hover { border-color: var(--ring); }
.stepper .v { flex: 1; text-align: center; font-variant-numeric: tabular-nums; font-size: .9rem; }

select.field, input.field, textarea.field {
  width: 100%; padding: .55rem .6rem; border-radius: var(--radius-sm);
  border: 1px solid var(--panel-border); background: var(--bg); color: var(--fg); font-size: .9rem;
}
.switch { display: flex; align-items: center; justify-content: space-between; gap: .6rem; padding: .35rem 0; }
.switch .tg {
  width: 44px; height: 25px; border-radius: 999px; background: var(--panel-border);
  position: relative; cursor: pointer; transition: background var(--dur-fast); flex: none; border: none;
}
.switch .tg::after {
  content: ""; position: absolute; top: 3px; left: 3px; width: 19px; height: 19px;
  border-radius: 50%; background: #fff; transition: transform var(--dur-fast) var(--ease);
}
.switch .tg.on { background: var(--accent); }
.switch .tg.on::after { transform: translateX(19px); }
.switch span { font-size: .88rem; }

/* ============================================================
   SEARCH
   ============================================================ */
#searchbox {
  position: fixed; top: calc(var(--topbar-h) + env(safe-area-inset-top,0) + 6px); left: 50%; transform: translateX(-50%) translateY(-12px);
  z-index: 75; width: min(40rem, 94vw);
  background: var(--panel); border: 1px solid var(--panel-border);
  border-radius: var(--radius); box-shadow: 0 14px 40px var(--shadow-strong);
  opacity: 0; pointer-events: none; transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
  padding: .8rem;
}
#searchbox.open { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
.search-input-row { display: flex; gap: .5rem; align-items: center; }
.search-input-row input {
  flex: 1; padding: .65rem .8rem; font-size: 1rem;
  border: 1px solid var(--panel-border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--fg);
}
.search-nav { display: flex; gap: .2rem; }
.search-nav button { width: 36px; height: 36px; }
.search-opts { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .55rem; }
.search-opts .opt {
  font-size: .76rem; padding: .3rem .55rem; border-radius: 999px; cursor: pointer;
  border: 1px solid var(--panel-border); background: var(--panel-2); color: var(--muted);
  user-select: none; transition: all var(--dur-fast);
}
.search-opts .opt.on { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
.search-count { margin-left: auto; font-size: .76rem; color: var(--muted); align-self: center; font-variant-numeric: tabular-nums; }
#search-results { max-height: 50vh; overflow-y: auto; margin-top: .6rem; }
#search-results .res { padding: .5rem .6rem; border-radius: var(--radius-sm); cursor: pointer; font-size: .9rem; }
#search-results .res:hover { background: var(--sel); }
#search-results .res .loc { color: var(--muted); font-size: .76rem; display: block; margin-bottom: .15rem; }
#search-results mark, .search-hist mark { background: var(--accent); color: var(--accent-fg); padding: 0 2px; border-radius: 3px; }
.search-hint { color: var(--muted); font-size: .82rem; padding: .4rem .6rem; }
.search-hist { display: flex; flex-wrap: wrap; gap: .35rem; padding: .3rem .6rem; }
.search-hist .h {
  font-size: .78rem; padding: .25rem .6rem; border-radius: 999px; cursor: pointer;
  background: var(--panel-2); border: 1px solid var(--panel-border); color: var(--fg);
}
.search-hist .h:hover { border-color: var(--accent); }

/* ============================================================
   READING AREA
   ============================================================ */
#book {
  max-width: var(--reading-width);
  margin: 0 auto;
  padding: calc(var(--topbar-h) + env(safe-area-inset-top,0) + 30px) var(--page-margin) 7rem;
  font-weight: var(--font-weight);
}
.cover {
  text-align: center; padding: 12vh 0 8vh; border-bottom: 1px solid var(--panel-border);
  margin-bottom: 2rem; position: relative;
}
.cover .crest {
  width: 86px; height: 86px; margin: 0 auto 1.6rem; display: block;
  filter: drop-shadow(0 4px 10px var(--shadow));
}
.cover .big {
  font-size: calc(2.2rem * var(--font-scale)); line-height: 1.18;
  color: var(--accent); margin: 0 0 1.1rem; letter-spacing: .015em; font-weight: 700;
}
.cover .rule { width: 60px; height: 2px; background: var(--accent); opacity: .55; margin: 1.2rem auto; }
.cover .sub { color: var(--muted); font-size: calc(1rem * var(--font-scale)); font-style: italic; line-height: 1.7; }

.chapter { padding-top: 1rem; scroll-margin-top: calc(var(--topbar-h) + 14px); }
.chapter-head { text-align: center; margin: 2.6rem 0 2rem; }
.chapter-num {
  font-variant: small-caps; letter-spacing: .2em; color: var(--muted);
  font-size: calc(.82rem * var(--font-scale)); margin-bottom: .45rem;
}
.chapter-title {
  font-size: calc(1.55rem * var(--font-scale)); color: var(--accent);
  margin: 0; font-weight: 700; line-height: 1.25;
}
.chapter-head::after {
  content: "\2727"; display: block; color: var(--accent); opacity: .55;
  font-size: calc(1rem * var(--font-scale)); margin: .9rem auto 0;
}
#book p {
  font-size: calc(1.12rem * var(--font-scale));
  margin: 0 0 var(--para-spacing); text-align: var(--text-align); hyphens: auto;
  text-indent: var(--para-indent);
  word-spacing: var(--word-spacing); letter-spacing: var(--letter-spacing);
}
#book p:first-of-type, .chapter-head + p { text-indent: 0; }
/* Drop cap on first paragraph of each chapter */
html[data-dropcap="on"] .chapter-head + p::first-letter {
  font-size: 3.1em; line-height: .82; float: left; padding: .05em .08em 0 0;
  color: var(--accent); font-weight: 700;
}
.scene-sep {
  text-align: center; color: var(--muted); margin: 2rem 0;
  letter-spacing: .8em; font-size: calc(1rem * var(--font-scale));
}

/* highlight marks inside text */
.hl { border-radius: 3px; padding: 0 1px; cursor: pointer; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
